services:
  adguard-home:
    networks:
      dockervlan:
        ipv4_address: 172.20.0.130
    mac_address: ""

  uptime-kuma:
    environment:
      UPTIME_KUMA_HOST: 0.0.0.0
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
    networks:
      dockervlan:
        ipv4_address: 172.20.0.132
    mac_address: ""

  node-red:
    networks:
      dockervlan:
        ipv4_address: 172.20.0.131
    mac_address: ""

  test:
    image: curlimages/curl:latest
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: "no"
    networks:
      dockervlan:
        ipv4_address: 172.20.0.133
    depends_on:
      adguard-home:
        condition: service_healthy
      uptime-kuma:
        condition: service_started
      node-red:
        condition: service_healthy
    command:
      - /bin/sh
      - -c
      - |
        set -e
        for service in adguard-home uptime-kuma node-red; do
          echo "Testing $${service}..."
          # Verify HTTP(S) availability and check for specific content patterns
          # For Uptime Kuma and Node-RED, we check for 'html' or specific UI markers
          # AdGuard Home also has a web UI
          curl --retry 15 --retry-delay 5 --retry-connrefused -L -k -f "https://$${service}:443/" | grep -qiE "html|adguard|uptime|node-red" || (echo "$${service} content verification failed" && exit 1)
          echo "$${service} is up and serving content."
        done
        echo "All tests passed!"

networks:
  dockervlan:
    driver: bridge
    driver_opts:
      parent: ""
    ipam:
      config:
        - subnet: 172.20.0.0/24
