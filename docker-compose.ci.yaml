services:
  adguard-home:
    networks:
      dockervlan:
        ipv4_address: 172.20.0.130
    mac_address: ""

  uptime-kuma:
    environment:
      UPTIME_KUMA_HOST: 172.20.0.132
    networks:
      dockervlan:
        ipv4_address: 172.20.0.132
    mac_address: ""
    healthcheck:
      # Use node as a healthcheck because wget/curl might not be present in the image
      test: ["CMD-SHELL", "node -e 'const https = require(\"https\"); const http = require(\"http\"); const check = (url, provider) => new Promise((resolve, reject) => { provider.get(url, { rejectUnauthorized: false }, (res) => { if (res.statusCode === 200 || res.statusCode === 302) resolve(); else reject(); }).on(\"error\", reject); }); Promise.any([check(\"http://127.0.0.1:443/\", http), check(\"https://127.0.0.1:443/\", https)]).then(() => process.exit(0)).catch(() => process.exit(1));'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  node-red:
    networks:
      dockervlan:
        ipv4_address: 172.20.0.131
    mac_address: ""

  test:
    image: curlimages/curl:latest
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: "no"
    networks:
      dockervlan:
        ipv4_address: 172.20.0.133
    depends_on:
      adguard-home:
        condition: service_healthy
      uptime-kuma:
        condition: service_healthy
      node-red:
        condition: service_healthy
    command:
      - /bin/sh
      - -c
      - |
        set -e
        for service in adguard-home uptime-kuma node-red; do
          echo "Testing $${service}..."
          curl --retry 10 --retry-delay 5 --retry-connrefused -k -f "https://$${service}:443/" || (echo "$${service} test failed" && exit 1)
        done
        echo "All tests passed!"

networks:
  dockervlan:
    driver: bridge
    driver_opts:
      parent: ""
    ipam:
      config:
        - subnet: 172.20.0.0/24
