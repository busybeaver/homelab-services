services:
  adguard-home:
    networks:
      dockervlan:
        ipv4_address: 172.20.0.130
    mac_address: ""

  uptime-kuma:
    environment:
      UPTIME_KUMA_HOST: "0.0.0.0"
    networks:
      dockervlan:
        ipv4_address: 172.20.0.132
    mac_address: ""

  node-red:
    networks:
      dockervlan:
        ipv4_address: 172.20.0.131
    mac_address: ""

  test:
    image: curlimages/curl:latest
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: "no"
    networks:
      dockervlan:
        ipv4_address: 172.20.0.133
    depends_on:
      adguard-home:
        condition: service_healthy
      uptime-kuma:
        condition: service_healthy
      node-red:
        condition: service_healthy
    command:
      - /bin/sh
      - -c
      - |
        set -e
        test_service() {
          local name=$$1
          local url=$$2
          local pattern=$$3
          echo "Testing $${name} at $${url}..."
          response=$$(curl --retry 5 --retry-delay 5 --retry-connrefused -k -s -f "$${url}")
          if [ $$? -eq 0 ]; then
            if echo "$${response}" | grep -q "$${pattern}"; then
              echo "$${name} test passed!"
            else
              echo "$${name} test failed: response did not match pattern '$${pattern}'"
              exit 1
            fi
          else
            echo "$${name} test failed: could not reach $${url}"
            exit 1
          fi
        }
        test_service "adguard-home" "https://adguard-home:443/" "AdGuard Home"
        test_service "uptime-kuma" "https://uptime-kuma:443/" "Uptime Kuma"
        test_service "node-red" "https://node-red:443/" "Node-RED"
        echo "All tests passed!"

networks:
  dockervlan:
    driver: bridge
    driver_opts:
      parent: ""
    ipam:
      config:
        - subnet: 172.20.0.0/24
