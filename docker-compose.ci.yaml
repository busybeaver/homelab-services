services:
  adguard-home:
    security_opt: []
    networks:
      dockervlan:
        ipv4_address: 172.20.0.130
    mac_address: ""

  uptime-kuma:
    security_opt: []
    environment:
      UPTIME_KUMA_HOST: 172.20.0.132
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
    networks:
      dockervlan:
        ipv4_address: 172.20.0.132
    mac_address: ""

  node-red:
    security_opt: []
    networks:
      dockervlan:
        ipv4_address: 172.20.0.131
    mac_address: ""

  test:
    image: curlimages/curl:latest
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: "no"
    networks:
      dockervlan:
        ipv4_address: 172.20.0.133
    depends_on:
      adguard-home:
        condition: service_healthy
      uptime-kuma:
        condition: service_healthy
      node-red:
        condition: service_healthy
    command:
      - /bin/sh
      - -c
      - |
        set -e
        echo "Testing adguard-home..."
        curl --retry 10 --retry-delay 5 --retry-connrefused -k -f "https://adguard-home:443/" | grep -q "AdGuard Home" || (echo "adguard-home test failed" && exit 1)
        echo "Testing uptime-kuma..."
        curl --retry 10 --retry-delay 5 --retry-connrefused -k -f "https://uptime-kuma:443/" | grep -q "Uptime Kuma" || (echo "uptime-kuma test failed" && exit 1)
        echo "Testing node-red..."
        curl --retry 10 --retry-delay 5 --retry-connrefused -k -f "https://node-red:443/" | grep -q "Node-RED" || (echo "node-red test failed" && exit 1)
        echo "All tests passed!"

networks:
  dockervlan:
    driver: bridge
    driver_opts:
      parent: ""
    ipam:
      config:
        - subnet: 172.20.0.0/24
