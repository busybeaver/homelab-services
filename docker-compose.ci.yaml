services:
  adguard-home:
    mac_address: ""

  uptime-kuma:
    mac_address: ""
    healthcheck:
      # Use Node.js to check connectivity to the HTTPS port
      test: ["CMD-SHELL", "node -e 'const c=require(\"net\").connect(443,\"127.0.0.1\",()=>process.exit(0));c.on(\"error\",()=>process.exit(1))'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  node-red:
    mac_address: ""
    healthcheck:
      test: ["CMD-SHELL", "node -e 'const c=require(\"net\").connect(443,\"127.0.0.1\",()=>process.exit(0));c.on(\"error\",()=>process.exit(1))'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  test:
    image: curlimages/curl:latest
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: "no"
    networks:
      dockervlan:
        ipv4_address: 192.168.1.133
    depends_on:
      adguard-home:
        condition: service_healthy
      uptime-kuma:
        condition: service_healthy
      node-red:
        condition: service_healthy
    command:
      - /bin/sh
      - -c
      - |
        set -e
        for service in adguard-home uptime-kuma node-red; do
          echo "Testing $${service}..."
          curl --retry 10 --retry-delay 5 --retry-connrefused -k -f "https://$${service}:443/" || (echo "$${service} test failed" && exit 1)
        done
        echo "All tests passed!"

networks:
  dockervlan:
    driver: bridge
    driver_opts:
      parent: ""
    ipam:
      config:
        - subnet: 192.168.1.0/24
