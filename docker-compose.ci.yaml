services:
  adguard-home:
    networks:
      dockervlan:
        ipv4_address: 172.20.0.130
    mac_address: ""

  uptime-kuma:
    environment:
      UPTIME_KUMA_HOST: 0.0.0.0
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
    networks:
      dockervlan:
        ipv4_address: 172.20.0.132
    mac_address: ""

  node-red:
    networks:
      dockervlan:
        ipv4_address: 172.20.0.131
    mac_address: ""

  test:
    image: curlimages/curl:latest
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: "no"
    networks:
      dockervlan:
        ipv4_address: 172.20.0.133
    depends_on:
      adguard-home:
        condition: service_healthy
      uptime-kuma:
        condition: service_started
      node-red:
        condition: service_healthy
    command:
      - /bin/sh
      - -c
      - |
        set -e
        for service in adguard-home uptime-kuma node-red; do
          echo "Testing $${service}..."
          # Resiliently attempt connectivity via both HTTP and HTTPS on port 443.
          # Some services (like Uptime Kuma) might serve HTTP on 443 during setup.
          SUCCESS=false
          for proto in https http; do
            echo "Attempting $${proto}://$${service}:443/..."
            if curl --retry 10 --retry-delay 3 --retry-connrefused -L -k -s "$${proto}://$${service}:443/" | grep -qiE "html|adguard|uptime|node-red|kuma|setup"; then
              echo "$${service} is up and serving content via $${proto}."
              SUCCESS=true
              break
            fi
          done
          if [ "$${SUCCESS}" = false ]; then
            echo "$${service} content verification failed on all protocols"
            exit 1
          fi
        done
        echo "All tests passed!"

networks:
  dockervlan:
    driver: bridge
    driver_opts:
      parent: ""
    ipam:
      config:
        - subnet: 172.20.0.0/24
